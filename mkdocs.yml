site_name: Django ERD Generator
site_description: Generate Entity-Relationship Diagrams from Django models
site_url: https://django-erd.mrzk.io
repo_url: https://github.com/marzukia/django-erd
repo_name: marzukia/django-erd

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Features:
      - ERD Generation: features/erd-generation.md
      - Data Dictionary: features/data-dictionary.md
      - Supported Dialects: features/supported-dialects.md
      - GIS Fields: features/gis-fields.md
  - API Reference: api.md
  - Contributing: contributing.md
  - Changelog: changelog.md

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/marzukia/django-erd
